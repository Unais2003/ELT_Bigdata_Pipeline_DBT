# automatic data quality checks and tests for the staging layer

version: 2

models:
  - name: stg_taxi_trips

    columns:

      - name: fare_amount
        tests:
          - not_null

      - name: payment_type
        tests:
          - accepted_values:
              arguments:
                values: [1,2,3,4,5,6]

      - name: trip_distance
        tests:
          - not_null